name: TopCredentialPairsAttempted
description: Most common username/password combinations from Cowrie
KQL query:
  - query: |
      tpot_CL
        | where honeypotType == "Cowrie"
        | where isnotempty(username) and isnotempty(password)
        | where eventid == "cowrie.login.failed" or eventid == "cowrie.login.success"
        | summarize 
            Attempts = count(),
            UniqueAttackers = dcount(src_ip),
            Countries = make_set(tostring(geoip.country_name), 5)
            by username, password
        | order by Attempts desc
        | take 50
Parameters: