name: MassScan
description: Detect IPs with scanner-like behavior (high flow rate, zero payload, Suricata anomalies)
KQL query:
  - query: |
      tpot_CL
      | where TimeGenerated > ago(24h)
      // Filter out events from Tpot itself, update the public ip of tpot to filter out noise
      | where src_ip != "144.91.81.120" and src_ip != "" and src_ip != "0.0.0.0" and src_ip !contains "2a02:c207:2314:9811"
      | where event_type == "flow" or event_type == "alert"
      | extend AlertSig = tostring(alert.signature)
      | summarize
          FlowCount = countif(event_type == "flow"),
          AlertCount = countif(event_type == "alert"),
          SpuriousRetrans = countif(AlertSig has "spurious retransmission"),
          NoSession = countif(AlertSig has "no session"),
          OneDirection = countif(AlertSig has "one direction"),
          ActiveMinutes = dcount(bin(TimeGenerated, 1m)),
          HoneypotsBit = dcount(honeypotType)
          by src_ip
      | extend FlowsPerMinute = FlowCount / max_of(ActiveMinutes, 1)
      | where FlowsPerMinute > 500 or (SpuriousRetrans > 10 and NoSession > 5)
      | extend ScannerType = case(
          SpuriousRetrans > 50, "Likely masscan",
          FlowsPerMinute > 1000 and NoSession > 0, "High-rate stateless scanner",
          FlowsPerMinute > 500, "Aggressive scanner",
          "Unknown scanner")
      | order by FlowsPerMinute desc
Parameters: