name: TpotIntelAttackerProfile
description: Returns top attacking IPs with geo, ASN, and attack profile
KQL query:
  - query: |
      tpot_CL
      | where TimeGenerated > ago({timeRange})
        // Filter out events from Tpot itself, update the public ip of tpot to filter out noise
      | where src_ip != "144.91.81.120" and src_ip != "" and src_ip != "0.0.0.0" and src_ip !contains "2a02:c207:2314:9811"
      | extend Country = tostring(geoip.country_name),
        City_ = tostring(geoip.city_name),
        ASN_ = tostring(geoip.asn)
      | summarize 
        TotalEvents = count(),
        HoneypotTypes = make_set(honeypotType, 10),
        HasMalware = countif(isnotempty(shasum)),
        UniqueMalware = dcount(shasum),
        HasCredentialAttempts = countif(isnotempty(username)),
        FirstSeen = min(TimeGenerated),
        LastSeen = max(TimeGenerated)
        by src_ip, Country, City_, ASN_
      | extend AttackDuration = LastSeen - FirstSeen
      | order by TotalEvents desc
      | take 25
Parameters:
  - name: timeRange
    description: datapoint interval for chart, 1d for daily intervals, 1h for hourly, 1m for by the minute