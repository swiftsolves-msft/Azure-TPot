name: IndustrialProtocolProbes
description: Detect probes against industrial control honeypots
KQL query:
  - query: |
      tpot_CL
      | where honeypotType in ("Conpot", "Dicompot")
      // Filter out events from Tpot itself, update the public ip of tpot to filter out noise
      | where src_ip != "144.91.81.120" and src_ip != "" and src_ip != "0.0.0.0" and src_ip !contains "2a02:c207:2314:9811" 
          or isnotempty(tostring(dnp3))
          or dest_port in ("502", "102", "20000", "44818", "47808")
      | extend Country = tostring(geoip.country_name)
      | summarize 
          Probes = count(),
          Protocols = make_set(app_proto, 5),
          DestPorts = make_set(dest_port, 10)
          by src_ip, Country, honeypotType
      | order by Probes desc
Parameters: